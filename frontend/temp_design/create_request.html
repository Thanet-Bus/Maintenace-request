<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>แจ้งซ่อมใหม่ - Maintenance Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "tertiary-container": "#f09a01",
                        "outline-variant": "#bbcbb8",
                        "surface-container-low": "#eff4ff",
                        "on-background": "#0b1c30",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#004395",
                        "inverse-primary": "#3ee26c",
                        "surface-container-high": "#dce9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-variant": "#d3e4fe",
                        "on-surface-variant": "#3c4a3c",
                        "surface-dim": "#cbdbf5",
                        "surface-container": "#e5eeff",
                        "inverse-surface": "#213145",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#00531f",
                        "surface": "#f8f9ff",
                        "secondary-fixed": "#d8e2ff",
                        "background": "#f8f9ff",
                        "on-secondary-fixed": "#001a42",
                        "on-tertiary-container": "#5d3900",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-secondary-container": "#fefcff",
                        "surface-container-highest": "#d3e4fe",
                        "on-primary-fixed": "#002108",
                        "tertiary-fixed": "#ffddb8",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#004c1b",
                        "secondary-fixed-dim": "#adc6ff",
                        "primary-container": "#06c755",
                        "on-surface": "#0b1c30",
                        "secondary-container": "#2170e4",
                        "primary-fixed": "#69ff89",
                        "secondary": "#0058be",
                        "surface-bright": "#f8f9ff",
                        "outline": "#6c7b6b",
                        "primary": "#006e2b",
                        "primary-fixed-dim": "#3ee26c",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-tint": "#006e2b",
                        "tertiary": "#855300",
                        "on-tertiary-fixed": "#2a1700",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding-desktop": "32px",
                        "card-gap": "20px",
                        "container-padding-mobile": "16px",
                        "base": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-md": ["22px", { "lineHeight": "30px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        /* Mobile safe area padding for modern devices */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased pt-safe selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm docked full-width top-0 sticky z-40">
<div class="flex justify-between items-center px-container-padding-mobile md:px-container-padding-desktop h-16 w-full">
<div class="flex items-center gap-3">
<!-- Back action for transactional page -->
<button class="p-2 text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">แจ้งซ่อมใหม่</h1>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-lg mx-auto px-container-padding-mobile py-6 flex flex-col gap-6 pb-32">
<!-- Form Container Level 1 Elevation -->
<form class="flex flex-col gap-6 bg-surface shadow-[0_2px_4px_rgba(0,0,0,0.05)] rounded-xl p-5">
<!-- Category Selection (Dropdown equivalent styled nicely) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="category">หมวดหมู่ <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg px-4 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md h-12" id="category">
<option disabled="" selected="" value="">เลือกหมวดหมู่ปัญหา</option>
<option value="ไฟฟ้า">ไฟฟ้า</option>
<option value="ประปา">ประปา</option>
<option value="แอร์">แอร์</option>
<option value="IT">IT</option>
<option value="เฟอร์นิเจอร์">เฟอร์นิเจอร์</option>
<option value="อื่น ๆ">อื่น ๆ</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="issue_title">หัวข้อปัญหา <span class="text-error">*</span></label>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md h-12" id="issue_title" placeholder="เช่น แอร์ไม่เย็น, หลอดไฟขาด" type="text"/>
</div>
<!-- Location Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="location">สถานที่ / ห้อง / จุดที่พบปัญหา <span class="text-error">*</span></label>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">location_on</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md h-12" id="location" placeholder="ระบุตำแหน่งที่ชัดเจน" type="text"/>
</div>
</div>
<!-- Details Textarea -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="details">รายละเอียดปัญหา</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md resize-none" id="details" placeholder="อธิบายอาการเบื้องต้น หรือข้อมูลเพิ่มเติม..." rows="3"></textarea>
</div>
<!-- Urgency Chips -->
<div class="flex flex-col gap-3">
<label class="font-label-md text-label-md text-on-surface">ความเร่งด่วน</label>
<div class="flex flex-wrap gap-3">
<label class="relative flex items-center justify-center">
<input class="peer sr-only" name="urgency" type="radio" value="low"/>
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md cursor-pointer peer-checked:bg-surface-container-highest peer-checked:border-primary peer-checked:text-on-surface peer-checked:font-semibold transition-all">
                            ต่ำ
                        </div>
</label>
<label class="relative flex items-center justify-center">
<input checked="" class="peer sr-only" name="urgency" type="radio" value="normal"/>
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md cursor-pointer peer-checked:bg-primary-container peer-checked:border-primary peer-checked:text-on-primary-container peer-checked:font-semibold transition-all">
                            ปกติ
                        </div>
</label>
<label class="relative flex items-center justify-center">
<input class="peer sr-only" name="urgency" type="radio" value="high"/>
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md cursor-pointer peer-checked:bg-tertiary-container peer-checked:border-tertiary peer-checked:text-on-tertiary-container peer-checked:font-semibold transition-all">
                            สูง
                        </div>
</label>
<label class="relative flex items-center justify-center">
<input class="peer sr-only" name="urgency" type="radio" value="urgent"/>
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md cursor-pointer peer-checked:bg-error-container peer-checked:border-error peer-checked:text-on-error-container peer-checked:font-semibold transition-all">
                            เร่งด่วน
                        </div>
</label>
</div>
</div>
<!-- Image Upload Area -->
<div class="flex flex-col gap-2 mt-2">
<label class="font-label-md text-label-md text-on-surface">อัปโหลดรูปภาพประกอบ</label>
<button class="w-full h-32 border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-lowest flex flex-col items-center justify-center gap-2 text-on-surface-variant hover:bg-surface-container-low hover:border-primary hover:text-primary transition-all" type="button">
<span class="material-symbols-outlined text-[32px]">add_a_photo</span>
<span class="font-label-md text-label-md">แตะเพื่อถ่ายรูป หรือเลือกรูปภาพ</span>
</button>
</div>
<!-- Contact Phone Input -->
<div class="flex flex-col gap-2 mt-2">
<label class="font-label-md text-label-md text-on-surface" for="contact_phone">เบอร์ติดต่อ <span class="text-error">*</span></label>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">call</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md h-12" id="contact_phone" placeholder="08X-XXX-XXXX" type="tel"/>
</div>
</div>
</form>
</main>
<!-- Bottom Action Area (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant/20 p-4 pb-safe z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
<div class="max-w-lg mx-auto">
<button class="w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md rounded-xl flex items-center justify-center gap-2 shadow-md hover:bg-surface-tint active:scale-95 transition-all" type="submit">
<span class="material-symbols-outlined">send</span>
                ส่งคำแจ้งซ่อม
            </button>
</div>
</div>
</body></html>
