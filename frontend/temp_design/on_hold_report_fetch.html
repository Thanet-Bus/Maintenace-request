<!DOCTYPE html><html lang="th"><head>
<meta charset="utf-8">

<style>
        body { background-color: theme('colors.background'); color: theme('colors.on-background'); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <style data-stitch-cursor="">*{cursor:crosshair!important}[contenteditable="true"]:focus,.cursor-text:focus{cursor:text!important}</style><style data-stitch-scroll-lock="">html,body{overflow:hidden!important}</style></head>
<body class="md:hidden">
<!-- TopAppBar equivalent for sub-page with back button -->
<header class="flex justify-between items-center px-container-padding-mobile h-16 w-full bg-surface shadow-sm sticky top-0 z-50">
<button class="text-on-surface-variant p-2 rounded-full hover:bg-surface-container-low transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface text-center flex-1 pr-10">แจ้งพักงาน</h1>
</header>
<main class="p-container-padding-mobile flex flex-col gap-card-gap pb-32">
<!-- Job Info Card -->
<section class="bg-surface rounded-xl p-5 shadow-[0_2px_4px_rgba(0,0,0,0.05)] border border-outline-variant/30 flex flex-col gap-2">
<div class="flex items-center justify-between">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Job ID</span>
<span class="font-label-md text-label-md text-on-surface bg-surface-container-high px-2 py-1 rounded-md">#REQ-1002</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">แอร์ไม่เย็น</h2>
</section>
<!-- Form -->
<form class="flex flex-col gap-card-gap">
<!-- Reason Section -->
<section class="flex flex-col gap-3">
<h3 class="font-label-md text-label-md text-on-surface-variant">ระบุเหตุผลที่พักงาน (Select Reason)</h3>
<div class="flex flex-col gap-2 bg-surface rounded-xl p-1 shadow-[0_2px_4px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<label class="flex items-center p-3 hover:bg-surface-container-low rounded-lg transition-colors cursor-pointer group">
<div class="relative flex items-center justify-center mr-3">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-full checked:border-primary checked:border-[6px] transition-all bg-surface" name="reason" type="radio" value="parts">
</div>
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">รออะไหล่ (Waiting for Parts)</span>
</label>
<label class="flex items-center p-3 hover:bg-surface-container-low rounded-lg transition-colors cursor-pointer group">
<div class="relative flex items-center justify-center mr-3">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-full checked:border-primary checked:border-[6px] transition-all bg-surface" name="reason" type="radio" value="tools">
</div>
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">ต้องใช้เครื่องมือพิเศษ (Special Tools Needed)</span>
</label>
<label class="flex items-center p-3 hover:bg-surface-container-low rounded-lg transition-colors cursor-pointer group">
<div class="relative flex items-center justify-center mr-3">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-full checked:border-primary checked:border-[6px] transition-all bg-surface" name="reason" type="radio" value="site">
</div>
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">หน้างานไม่พร้อม (Site Not Ready)</span>
</label>
<label class="flex items-center p-3 hover:bg-surface-container-low rounded-lg transition-colors cursor-pointer group">
<div class="relative flex items-center justify-center mr-3">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-full checked:border-primary checked:border-[6px] transition-all bg-surface" name="reason" type="radio" value="other">
</div>
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">อื่น ๆ (Other)</span>
</label>
</div>
</section>
<!-- Additional Notes -->
<section class="flex flex-col gap-3">
<label class="font-label-md text-label-md text-on-surface-variant" for="notes">รายละเอียดเพิ่มเติม (Additional Notes)</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-xl p-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all resize-none shadow-[0_2px_4px_rgba(0,0,0,0.05)]" id="notes" placeholder="ระบุรายละเอียดเพิ่มเติมที่นี่..." rows="4"></textarea>
</section>
<!-- Upload Evidence -->
<section class="flex flex-col gap-3">


</section>
</form>
</main>
<!-- Fixed Action Bottom Bar (for sub-page actions) -->
<div class="fixed bottom-0 left-0 w-full bg-surface p-container-padding-mobile pb-safe flex gap-3 shadow-[0_-4px_20px_rgba(0,0,0,0.08)] z-40 border-t border-outline-variant/20">
<button class="flex-1 bg-surface-container text-on-surface font-label-md text-label-md py-4 rounded-xl flex justify-center items-center h-12 shadow-sm hover:bg-surface-container-high transition-colors">
            ยกเลิก
        </button>
<button class="flex-[2] bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl flex justify-center items-center h-12 shadow-md hover:bg-surface-tint transition-colors">
            ยืนยันการพักงาน
        </button>
</div>
